services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      - DB_URL=postgres://user:password@postgres:5432/votes?sslmode=disable
      - GIN_MODE=release
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      # Tells the ADC library where to find the mounted gcloud credentials.
      # This is only needed locally — on GCP the metadata server handles auth.
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      - redis
      - nats
      - postgres

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  nats:
    image: nats:alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: always

  postgres:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=votes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
