name: CI Test Contestant

on:
  pull_request:
    branches:
      - dev
    paths:
      - "server/internal/service/contestant/**"
      - "server/internal/repository/contestant/**"
      - "server/internal/api/handler/contestant_handler.go"
      - "server/internal/api/handler/contestant_handler_test.go"
      - "server/internal/model/domain/contestant.go"
      - "server/internal/model/dto/contestant_dto.go"
      - "server/internal/testutil/**"
      - "server/go.mod"
      - "server/go.sum"
      - ".github/workflows/ci-test-contestant.yml"

jobs:
  contestant-tests:
    name: Contestant Domain Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache-dependency-path: server/go.sum

      - name: Run contestant service unit tests
        run: go test ./internal/service/contestant -v

      - name: Run contestant repository unit tests
        run: go test ./internal/repository/contestant -v

      - name: Run contestant handler tests
        run: go test ./internal/api/handler -run 'Test(ListContestants|CreateContestant|UpdateContestant|DeleteContestant)' -v
